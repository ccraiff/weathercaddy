<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeatherCaddy — Sand Ridge</title>
<style>
  body { font-family: sans-serif; background: #1a1a2e; color: #ecf0f1; margin: 0; padding: 20px; }
  h1 { color: #e74c3c; text-align: center; }
  .back { color: #95a5a6; text-decoration: none; display: block; text-align: center; margin-bottom: 20px; }
  .back:hover { color: #ecf0f1; }
  .toggle-container { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 20px 0; }
  .toggle-label { font-size: 16px; color: #95a5a6; }
  .toggle-label.active { color: #e74c3c; font-weight: bold; }
  .toggle { position: relative; width: 60px; height: 30px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #c0392b; border-radius: 30px; transition: 0.3s; }
  .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background: white; border-radius: 50%; transition: 0.3s; }
  input:checked + .slider:before { transform: translateX(30px); }
  .conditions { background: #2c2c4e; border: 1px solid #c0392b; border-radius: 8px; padding: 15px; margin: 20px 0; }
  .conditions h3 { color: #e74c3c; margin: 0 0 8px 0; }
  .forecast { font-size: 12px; color: #95a5a6; margin-top: 8px; }
  .hole { background: #2c2c4e; border-left: 4px solid #c0392b; border-radius: 4px; padding: 12px 15px; margin: 8px 0; }
  .hole-name { color: #e74c3c; font-weight: bold; font-size: 15px; }
  .hole-wind { color: #f39c12; font-size: 13px; margin-top: 3px; }
  .tip-label { color: #95a5a6; font-size: 11px; text-transform: uppercase; margin-top: 8px; }
  .tip-disc { color: #3498db; font-size: 13px; margin-top: 2px; }
  .tip-strategy { color: #ecf0f1; font-size: 13px; margin-top: 2px; }
  .timestamp { text-align: center; color: #95a5a6; font-size: 12px; margin-top: 20px; }
  .loading { text-align: center; color: #95a5a6; padding: 40px; }
  .error { text-align: center; color: #e74c3c; padding: 40px; }
</style>
</head>
<body>
<a href="../index.html" class="back">← All Courses</a>
<h1>Sand Ridge Disc Golf</h1>
<p style="text-align:center;color:#95a5a6">Bridgman, Michigan</p>

<div class="toggle-container">
  <span class="toggle-label active" id="rhLabel">Right Hand</span>
  <label class="toggle">
    <input type="checkbox" id="handToggle" onchange="renderReport()">
    <span class="slider"></span>
  </label>
  <span class="toggle-label" id="lhLabel">Left Hand</span>
</div>

<div id="report"><div class="loading">Loading latest wind briefing...</div></div>
<div class="timestamp" id="timestamp"></div>

<script>
const REPORT_URL = 'report.json';
let reportData = null;

function renderReport() {
  if (!reportData) return;
  const isLH = document.getElementById('handToggle').checked;
  document.getElementById('rhLabel').className = 'toggle-label' + (isLH ? '' : ' active');
  document.getElementById('lhLabel').className = 'toggle-label' + (isLH ? ' active' : '');

  let html = '';

  if (reportData.current_wind) {
    const w = reportData.current_wind;
    html += '<div class="conditions"><h3>Current Conditions</h3>';
    html += '<p>' + w.speed_mph + ' mph from ' + w.direction_degrees + '° — ' + (w.description || '') + ' Gusts to ' + w.gusts_mph + ' mph.</p>';
    if (reportData.forecast_5hr && reportData.forecast_5hr.length) {
      html += '<div class="forecast"><strong>5-Hour Forecast:</strong><br>';
      reportData.forecast_5hr.forEach(function(f) {
        const t = f.time_utc ? f.time_utc.replace('T',' ').replace('Z','') + ' UTC' : '';
        html += t + ': ' + f.speed_mph + ' mph from ' + f.direction_degrees + '°<br>';
      });
      html += '</div>';
    }
    html += '</div>';
  } else if (reportData.conditions) {
    html += '<div class="conditions"><h3>Current Conditions</h3><p>' + reportData.conditions + '</p></div>';
  }

  if (reportData.holes && reportData.holes.length) {
    reportData.holes.forEach(function(hole) {
      const name = hole.hole_number ? 'Hole ' + hole.hole_number : (hole.name || 'Hole');
      const wind = hole.wind_info;
      const tips = isLH ? hole.tips_lhbh : hole.tips_rhbh;
      const tipsAlt = isLH ? hole.tips_lh : hole.tips_rh;
      const tip = tips || tipsAlt || {};

      html += '<div class="hole">';
      html += '<div class="hole-name">' + name + '</div>';
      if (wind) {
        html += '<div class="hole-wind">' + wind.clock_face + ' — ' + (wind.description || '') + '</div>';
      }
      if (tip.disc_recommendation) {
        html += '<div class="tip-label">Disc</div>';
        html += '<div class="tip-disc">' + tip.disc_recommendation + '</div>';
      }
      if (tip.shot_strategy) {
        html += '<div class="tip-label">Strategy</div>';
        html += '<div class="tip-strategy">' + tip.shot_strategy + '</div>';
      }
      if (typeof tip === 'string') {
        html += '<div class="tip-strategy">' + tip + '</div>';
      }
      html += '</div>';
    });
  }

  document.getElementById('report').innerHTML = html || '<div class="error">No report data available.</div>';
  const ts = reportData.report_generated_at || reportData.timestamp || '';
  if (ts) document.getElementById('timestamp').textContent = 'Last updated: ' + ts;
}

fetch(REPORT_URL + '?t=' + Date.now())
  .then(function(r) { return r.json(); })
  .then(function(data) {
    reportData = data;
    renderReport();
  })
  .catch(function() {
    document.getElementById('report').innerHTML = '<div class="error">Report not yet available. Check back soon!</div>';
  });
</script>
</body>
</html>
